name: Test

on:
  workflow_call:
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project app/Taskmato.xcodeproj \
            -scheme Taskmato \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Convert coverage to lcov
        run: |
          PROFDATA=$(find DerivedData/Build/ProfileData -name "Coverage.profdata" | head -1)
          BINARY=$(find DerivedData/Build/Products -name "Taskmato" -type f | grep "MacOS/Taskmato$" | head -1)

          echo "profdata: $PROFDATA"
          echo "binary:   $BINARY"

          mkdir -p coverage
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile="$PROFDATA" \
            "$BINARY" \
            --ignore-filename-regex='.*Tests.*' \
            > coverage/coverage.lcov

          wc -l coverage/coverage.lcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
