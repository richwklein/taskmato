included:
  - app/Taskmato
  - app/TaskmatoTests
  - app/TaskmatoUITests

excluded:
  - .build
  - .worktrees

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - empty_count
  - empty_string
  - first_where
  - toggle_bool

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100
