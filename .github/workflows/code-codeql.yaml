name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1' # weekly, Monday 04:23 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            runner: ubuntu-latest
          - language: swift
            runner: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: ${{ matrix.language }}

      - name: Sync version
        if: matrix.language == 'swift'
        run: bash scripts/sync-version.sh

      - name: Build Swift project (for CodeQL extraction)
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project app/Taskmato.xcodeproj \
            -scheme Taskmato \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.0
        with:
          category: '/language:${{ matrix.language }}'
